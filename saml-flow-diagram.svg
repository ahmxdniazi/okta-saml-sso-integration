<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" width="900" height="620">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#065f46"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000060"/>
    </filter>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#ffffff06"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bg)" rx="16"/>
  <rect width="900" height="620" fill="url(#dots)" rx="16"/>

  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" fill="#f1f5f9" font-family="Georgia, serif" font-size="22" font-weight="700">SAML 2.0 Authentication Flow</text>
  <text x="450" y="68" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="12">Okta as Identity Provider (IdP) · SP-Initiated SSO</text>
  <line x1="60" y1="80" x2="840" y2="80" stroke="#1e3a5f" stroke-width="1"/>

  <!-- ── Column headers ── -->
  <!-- User -->
  <rect x="60" y="95" width="130" height="44" rx="22" fill="url(#blue)" filter="url(#shadow)"/>
  <text x="125" y="122" text-anchor="middle" fill="#fff" font-family="monospace" font-size="13" font-weight="700">👤 User</text>

  <!-- SP -->
  <rect x="355" y="95" width="190" height="44" rx="22" fill="#1e293b" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="118" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="12" font-weight="700">🖥 Service Provider</text>
  <text x="450" y="132" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">(SAML Test App)</text>

  <!-- Okta IdP -->
  <rect x="700" y="95" width="140" height="44" rx="22" fill="url(#orange)" filter="url(#shadow)"/>
  <text x="770" y="118" text-anchor="middle" fill="#fff" font-family="monospace" font-size="12" font-weight="700">🔐 Okta IdP</text>
  <text x="770" y="132" text-anchor="middle" fill="#fffbeb" font-family="monospace" font-size="10">Identity Provider</text>

  <!-- Vertical lanes -->
  <line x1="125" y1="140" x2="125" y2="560" stroke="#1e3a5f" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="450" y1="140" x2="450" y2="560" stroke="#1e3a5f" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="770" y1="140" x2="770" y2="560" stroke="#1e3a5f" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Step 1: User → SP -->
  <rect x="30" y="155" width="200" height="46" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="40" y="174" fill="#94a3b8" font-family="monospace" font-size="10">STEP 1</text>
  <text x="40" y="190" fill="#e2e8f0" font-family="monospace" font-size="11">Access protected resource</text>
  <line x1="125" y1="200" x2="440" y2="200" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="200" y="185" width="80" height="18" rx="4" fill="#0f172a"/>
  <text x="240" y="198" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="10">HTTP GET</text>

  <!-- Step 2: SP → User (Redirect) -->
  <rect x="530" y="225" width="210" height="46" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="540" y="244" fill="#94a3b8" font-family="monospace" font-size="10">STEP 2</text>
  <text x="540" y="260" fill="#e2e8f0" font-family="monospace" font-size="11">Generate AuthnRequest</text>
  <line x1="450" y1="248" x2="140" y2="248" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="260" y="233" width="120" height="18" rx="4" fill="#0f172a"/>
  <text x="320" y="246" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="10">302 Redirect to IdP</text>

  <!-- Step 3: User → Okta -->
  <rect x="30" y="290" width="230" height="46" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="40" y="309" fill="#94a3b8" font-family="monospace" font-size="10">STEP 3</text>
  <text x="40" y="325" fill="#e2e8f0" font-family="monospace" font-size="11">Forward AuthnRequest to Okta</text>
  <line x1="125" y1="318" x2="758" y2="318" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="390" y="303" width="130" height="18" rx="4" fill="#0f172a"/>
  <text x="455" y="316" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="10">SAML AuthnRequest</text>

  <!-- Step 4: Okta authenticates -->
  <rect x="620" y="350" width="240" height="46" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="630" y="369" fill="#fbbf24" font-family="monospace" font-size="10">STEP 4</text>
  <text x="630" y="385" fill="#e2e8f0" font-family="monospace" font-size="11">🔑 Okta authenticates user</text>

  <!-- Step 5: Okta → User (SAML Response) -->
  <rect x="530" y="418" width="230" height="46" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="540" y="437" fill="#94a3b8" font-family="monospace" font-size="10">STEP 5</text>
  <text x="540" y="453" fill="#e2e8f0" font-family="monospace" font-size="11">Send signed SAML Assertion</text>
  <line x1="758" y1="442" x2="140" y2="442" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <rect x="350" y="427" width="150" height="18" rx="4" fill="#0f172a"/>
  <text x="425" y="440" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="10">X.509 Signed Response</text>

  <!-- Step 6: User → SP (POST Assertion) -->
  <rect x="30" y="484" width="230" height="46" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="40" y="503" fill="#94a3b8" font-family="monospace" font-size="10">STEP 6</text>
  <text x="40" y="519" fill="#e2e8f0" font-family="monospace" font-size="11">POST assertion to SP ACS URL</text>
  <line x1="125" y1="510" x2="440" y2="510" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="210" y="495" width="110" height="18" rx="4" fill="#0f172a"/>
  <text x="265" y="508" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="10">HTTP POST</text>

  <!-- Step 7: SP validates + grants -->
  <rect x="310" y="545" width="280" height="46" rx="8" fill="#065f46" stroke="#10b981" stroke-width="1.5"/>
  <text x="320" y="564" fill="#6ee7b7" font-family="monospace" font-size="10">STEP 7</text>
  <text x="320" y="580" fill="#ecfdf5" font-family="monospace" font-size="11">✅ SP validates cert → Access Granted!</text>

  <!-- Bottom note -->
  <rect x="60" y="592" width="780" height="20" rx="4" fill="#0f172a"/>
  <text x="450" y="606" text-anchor="middle" fill="#475569" font-family="monospace" font-size="10">All assertions are signed with Okta's X.509 RSA certificate · No passwords exchanged with SP · Zero Trust compliant</text>
</svg>
